<section class="commercial-product">
  <div class="inner">
    <div class="product-image">
      <img src="/images/pro/com-product.png" alt="OpenIDE Pro коммерческий продукт" width="580" height="400" />
    </div>

    <div class="content">
      <h2 class="title">Коммерческий продукт с открытой основой</h2>
      <p class="description">
        OpenIDE Pro — платное решение, потому что корпоративная поддержка, SLA
        и развитие профессиональных инструментов требуют устойчивых ресурсов
        и ответственности за результат.
      </p>
      <p class="subtitle">При этом:</p>
      <ul class="list">
        <li class="list-item" *ngFor="let item of listItems">{{ item }}</li>
      </ul>
    </div>
  </div>
</section>
