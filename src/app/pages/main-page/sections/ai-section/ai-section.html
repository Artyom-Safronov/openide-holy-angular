<section class="ai-section">
  <div class="inner">
    <div class="content">
      <span class="label">Искусственный интеллект</span>
      <h2 class="title">OpenIDE как среда для работы с AI</h2>
      <p class="description">
        OpenIDE интегрируется с ведущими AI-ассистентами для разработчиков. Используйте
        GigaCode, Yandex Code Assistant, Continue, KiloCode и другие прямо из IDE — без
        переключения контекста.
      </p>
      <ul class="list">
        <li class="list-item" *ngFor="let feature of features">
          <span class="dot"></span>
          {{ feature }}
        </li>
      </ul>
      <a href="/marketplace/?tag=ai" class="link">Смотреть AI-плагины →</a>
    </div>

    <div class="image-wrap">
      <img
        src="/images/home/ai-assistants.png"
        alt="AI-ассистенты в OpenIDE — GigaCode, KiloCode, Yandex Code Assistant"
        width="560"
        height="420"
        class="image"
      />
    </div>
  </div>
</section>
